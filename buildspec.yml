version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
  pre_build:
    commands:
      - cd weather-app
      - npm install
  build:
    commands:
      - npm run build
  post_build:
    commands:
      - echo "Syncing to bucket ${S3_BUCKET}"
      - aws s3 sync dist/ s3://${S3_BUCKET}/ --delete 2>&1 || (echo "S3 sync failed" && exit 1)

artifacts:
  files:
    - '**/*'
  base-directory: weather-app/dist
